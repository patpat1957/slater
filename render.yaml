# ─────────────────────────────────────────────────────────────
#  Render Blueprint — Lotto Extraction API v2.0 with ML Engine
#  https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────────────
services:
  - type: web
    name: lotto-api
    runtime: python
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --worker-class uvicorn.workers.UvicornWorker --timeout 120 --graceful-timeout 30 --keep-alive 5 --access-logfile -
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ENV
        value: "production"
      - key: ML_ENABLED
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"
